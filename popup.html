<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }
    .menu-item {
      display: block;
      padding: 12px 16px;
      text-decoration: none;
      color: #172b4d;
      border-bottom: 1px solid #dfe1e6;
      cursor: pointer;
      transition: background 0.2s;
    }
    .menu-item:hover {
      background: #f4f5f7;
    }
    .menu-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <a href="options.html" target="_blank" class="menu-item">⚙️ Options</a>
  <a href="analytics.html" target="_blank" class="menu-item">📊 Analytics</a>
  <script>
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        chrome.tabs.create({ url: item.getAttribute('href') });
      });
    });
  </script>
</body>
</html>
